name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            build-targets: --win
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: ubuntu-latest
            build-targets: --linux
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: macos-latest
            build-targets: --mac
            electron-cache-path: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        id: electron-cache
        with:
          path: ${{ matrix.electron-cache-path }}
          key: ${{ runner.os }}-electron-31.7.7

      - name: Install dependencies
        run: npm ci --maxsockets 4 --fetch-retries 5
        env:
          npm_config_timeout: 120000

      - name: Build app
        run: npm run build

      - name: Package installers
        run: npx electron-builder ${{ matrix.build-targets }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release
          find dist-artifacts -type f -exec cp -v {} release/ \;

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CinePeer ${{ github.ref_name }}
          body: |
            See [CHANGELOG](./CHANGELOG.md) for details.
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
