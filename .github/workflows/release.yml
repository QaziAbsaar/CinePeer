name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            build-targets: --win
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: ubuntu-latest
            build-targets: --linux
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: macos-latest
            build-targets: --mac
            electron-cache-path: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        id: electron-cache
        with:
          path: ${{ matrix.electron-cache-path }}
          key: ${{ runner.os }}-electron-31.7.7

      - name: Install dependencies
        run: npm ci --maxsockets 4 --fetch-retries 5
        env:
          npm_config_timeout: 120000

      - name: Build app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder ${{ matrix.build-targets }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
