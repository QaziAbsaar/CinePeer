name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            build-targets: --win
          - os: ubuntu-latest
            build-targets: --linux
          - os: macos-latest
            build-targets: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder ${{ matrix.build-targets }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
