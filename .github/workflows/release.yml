name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            build-targets: --win
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: ubuntu-latest
            build-targets: --linux
            electron-cache-path: |
              ~/.cache/electron
              ~/.cache/electron-builder
          - os: macos-latest
            build-targets: --mac
            electron-cache-path: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        id: electron-cache
        with:
          path: ${{ matrix.electron-cache-path }}
          key: ${{ runner.os }}-electron-31.7.7

      - name: Install dependencies
        run: npm ci --maxsockets 4 --fetch-retries 5
        env:
          npm_config_timeout: 120000

      - name: Build app
        run: npm run build

      - name: Package installers
        run: npx electron-builder ${{ matrix.build-targets }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect installer files
        run: |
          mkdir -p release
          find dist-artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp -v {} release/ \;
          echo "--- Collected files ---"
          ls -lh release/

      - name: Create Release and Upload Assets
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "CinePeer ${{ github.ref_name }}" \
            --notes "Automated release from tag ${{ github.ref_name }}." \
            release/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
